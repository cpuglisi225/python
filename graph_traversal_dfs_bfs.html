<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Traversal Visualization: BFS vs DFS</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --border-color: #cbd5e1;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            
            --node-default: #e2e8f0;
            --node-structure: #f59e0b; /* Amber */
            --node-current: #3b82f6;   /* Blue */
            --node-visited: #10b981;   /* Green */
            
            --edge-default: #94a3b8;
            --edge-trace: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 16px 24px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.25rem; font-weight: 600; }
        
        .status-bar {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Panel - Graph Area */
        #graph-panel {
            flex: 1;
            position: relative;
            background: var(--panel-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: 100%;
            cursor: crosshair;
        }

        .node circle {
            stroke: #94a3b8;
            stroke-width: 2px;
            transition: fill 0.3s ease;
        }

        .node circle:hover {
            stroke: var(--text-dark);
            stroke-width: 3px;
            cursor: pointer;
        }

        .node text {
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: central;
        }

        .link {
            stroke: var(--edge-default);
            stroke-width: 2px;
            transition: stroke 0.3s ease, stroke-width 0.3s ease;
        }

        /* Right Panel - Controls & Data */
        #sidebar {
            width: 380px;
            background: var(--bg-color);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--panel-bg);
        }

        .section h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* Controls */
        .control-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        label { font-size: 0.85rem; font-weight: 500; }
        
        select, input[type="range"] { width: 100%; }

        button {
            padding: 8px 12px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
            flex: 1;
        }

        button:hover:not(:disabled) { background: #e2e8f0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .primary-btn { background: var(--text-dark); color: white; border: none; }
        .primary-btn:hover:not(:disabled) { background: #334155; }

        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-box { width: 14px; height: 14px; border: 1px solid #94a3b8; border-radius: 3px; }

        /* Data Structure View */
        #ds-container {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            min-height: 120px;
            display: flex;
            gap: 8px;
            overflow: auto;
        }

        .ds-item {
            background: var(--node-structure);
            color: white;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .ds-queue { flex-direction: row; align-items: center; }
        .ds-stack { flex-direction: column; align-items: center; }
        
        .ds-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 4px;
            font-family: monospace;
        }

        /* Output View */
        .output-box {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.9rem;
            min-height: 60px;
            word-wrap: break-word;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <header>
        <h1>Graph Traversal Visualization</h1>
        <div class="status-bar" id="status-text">Ready. Adjust graph settings or click "Regenerate".</div>
    </header>

    <main>
        <section id="graph-panel">
            <svg id="graph-svg" viewBox="0 0 1280 720" preserveAspectRatio="xMidYMid meet"></svg>
        </section>

        <aside id="sidebar">
            <div class="section">
                <h2>Graph Settings</h2>
                <div class="control-group">
                    <div class="control-row">
                        <label>Nodes (<span id="node-count-val">15</span>)</label>
                        <input type="range" id="node-count" min="5" max="25" value="15">
                    </div>
                </div>
                <div class="control-group">
                    <div class="control-row">
                        <label>Density (<span id="density-val">Low</span>)</label>
                        <input type="range" id="density" min="0" max="2" value="0" step="1">
                    </div>
                </div>
                <div class="control-group" style="margin-top: 12px;">
                    <button id="btn-regenerate" class="primary-btn">Regenerate Graph</button>
                </div>
            </div>

            <div class="section">
                <h2>Algorithm Controls</h2>
                <div class="control-group">
                    <label>Algorithm</label>
                    <select id="algo-select">
                        <option value="BFS">Breadth-First Search (Queue)</option>
                        <option value="DFS">Depth-First Search (Stack)</option>
                    </select>
                </div>
                <div class="control-group">
                    <div class="control-row">
                        <label>Trace Edges</label>
                        <input type="checkbox" id="trace-toggle" checked>
                    </div>
                </div>
                <div class="control-group">
                    <div class="control-row">
                        <label>Speed</label>
                        <input type="range" id="speed" min="100" max="1500" value="600" dir="rtl">
                    </div>
                </div>
                <div class="control-row" style="margin-top: 16px;">
                    <button id="btn-step" disabled>Step</button>
                    <button id="btn-play" disabled class="primary-btn">Play</button>
                    <button id="btn-reset" disabled>Reset</button>
                </div>
            </div>

            <div class="section">
                <h2>Legend</h2>
                <div class="legend">
                    <div class="legend-item"><div class="legend-box" style="background: var(--node-default);"></div> Unvisited</div>
                    <div class="legend-item"><div class="legend-box" style="background: var(--node-structure);"></div> In Structure</div>
                    <div class="legend-item"><div class="legend-box" style="background: var(--node-current);"></div> Processing</div>
                    <div class="legend-item"><div class="legend-box" style="background: var(--node-visited);"></div> Visited</div>
                </div>
            </div>

            <div class="section">
                <h2>Data Structure: <span id="ds-title">Queue</span></h2>
                <div class="ds-label" id="ds-indicators">Front &rarr; ... &larr; Back</div>
                <div id="ds-container" class="ds-queue"></div>
            </div>

            <div class="section">
                <h2>Visited Order</h2>
                <div class="output-box" id="output-visited">None</div>
            </div>
        </aside>
    </main>

    <script>
        // --- Core State Management ---
        const State = {
            graph: { nodes: [], links: [] },
            adjacencyList: {},
            startNode: null,
            algorithm: 'BFS',
            isRunning: false,
            isPaused: true,
            generator: null,
            playInterval: null,
            visitedNodes: [],
            structureState: [],
            traceMode: true
        };

        // --- DOM Elements ---
        const svg = d3.select("#graph-svg");
        // Dimensioni aggiornate per il formato 16:9
        const svgWidth = 1280;
        const svgHeight = 720;
        const nodeRadius = 18;
        const margin = 40; // Margine di sicurezza per evitare che i nodi tocchino i bordi
        
        const gLinks = svg.append("g").attr("class", "links");
        const gNodes = svg.append("g").attr("class", "nodes");

        const UI = {
            nodeCount: document.getElementById('node-count'),
            nodeCountVal: document.getElementById('node-count-val'),
            density: document.getElementById('density'),
            densityVal: document.getElementById('density-val'),
            btnRegenerate: document.getElementById('btn-regenerate'),
            algoSelect: document.getElementById('algo-select'),
            traceToggle: document.getElementById('trace-toggle'),
            speed: document.getElementById('speed'),
            btnStep: document.getElementById('btn-step'),
            btnPlay: document.getElementById('btn-play'),
            btnReset: document.getElementById('btn-reset'),
            statusText: document.getElementById('status-text'),
            dsTitle: document.getElementById('ds-title'),
            dsIndicators: document.getElementById('ds-indicators'),
            dsContainer: document.getElementById('ds-container'),
            outputVisited: document.getElementById('output-visited')
        };

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        // --- Graph Generation Logic ---
        function generateGraph() {
            resetSimulationState();
            const numNodes = parseInt(UI.nodeCount.value);
            const densityLevel = parseInt(UI.density.value); 
            
            State.graph.nodes = Array.from({ length: numNodes }, (_, i) => ({ 
                id: alphabet[i % 26] + (i >= 26 ? Math.floor(i/26) : ""),
                index: i 
            }));
            State.graph.links = [];
            State.adjacencyList = {};
            State.graph.nodes.forEach(n => State.adjacencyList[n.id] = []);

            // 1. Spanning tree to ensure connectivity
            for (let i = 1; i < numNodes; i++) {
                let target = Math.floor(Math.random() * i);
                addLink(State.graph.nodes[i].id, State.graph.nodes[target].id);
            }

            // 2. Add extra edges based on density
            const maxExtra = (numNodes * (numNodes - 1)) / 2 - (numNodes - 1);
            const densityMultipliers = [0, 0.15, 0.4]; // Sparse, Medium, Dense
            let extraEdges = Math.floor(maxExtra * densityMultipliers[densityLevel]);
            
            let attempts = 0;
            while (extraEdges > 0 && attempts < maxExtra * 2) {
                let u = Math.floor(Math.random() * numNodes);
                let v = Math.floor(Math.random() * numNodes);
                if (u !== v) {
                    let uId = State.graph.nodes[u].id;
                    let vId = State.graph.nodes[v].id;
                    if (!State.adjacencyList[uId].includes(vId)) {
                        addLink(uId, vId);
                        extraEdges--;
                    }
                }
                attempts++;
            }

            // Sort adjacency lists alphabetically for deterministic traversal
            for (let key in State.adjacencyList) {
                State.adjacencyList[key].sort();
            }

            renderGraph();
            UI.statusText.innerText = "Graph generated. Click a node to select the starting point.";
        }

        function addLink(source, target) {
            State.graph.links.push({ source, target });
            State.adjacencyList[source].push(target);
            State.adjacencyList[target].push(source);
        }

        // --- Graph Rendering Logic ---
        function renderGraph() {
            // Setup Force Simulation con bilanciamento migliorato
            const simulation = d3.forceSimulation(State.graph.nodes)
                .force("link", d3.forceLink(State.graph.links).id(d => d.id).distance(120)) // Distanza aumentata
                .force("charge", d3.forceManyBody().strength(-300)) // Repulsione mitigata
                .force("center", d3.forceCenter(svgWidth / 2, svgHeight / 2))
                .force("collide", d3.forceCollide().radius(nodeRadius * 2.5));

            // Esecuzione invisibile per stabilizzare la posizione
            for (let i = 0; i < 300; ++i) {
                simulation.tick();
                
                // BOUNDING BOX LOGIC: Impedisce ai nodi di uscire dalla visualizzazione SVG
                State.graph.nodes.forEach(d => {
                    d.x = Math.max(margin, Math.min(svgWidth - margin, d.x));
                    d.y = Math.max(margin, Math.min(svgHeight - margin, d.y));
                });
            }
            simulation.stop(); // Blocca l'animazione caotica iniziale

            // Render Links
            const linkSelection = gLinks.selectAll(".link")
                .data(State.graph.links, d => d.source.id + "-" + d.target.id);
            
            linkSelection.exit().remove();
            
            const linkEnter = linkSelection.enter()
                .append("line")
                .attr("class", "link")
                .attr("id", d => `link-${d.source.id}-${d.target.id}`);

            linkEnter.merge(linkSelection)
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            // Render Nodes
            const nodeSelection = gNodes.selectAll(".node")
                .data(State.graph.nodes, d => d.id);
            
            nodeSelection.exit().remove();

            const nodeEnter = nodeSelection.enter()
                .append("g")
                .attr("class", "node")
                .attr("id", d => `node-${d.id}`)
                .on("click", (event, d) => handleNodeClick(d.id));

            nodeEnter.append("circle")
                .attr("r", nodeRadius)
                .attr("fill", "var(--node-default)");

            nodeEnter.append("text")
                .text(d => d.id);

            nodeEnter.merge(nodeSelection)
                .attr("transform", d => `translate(${d.x},${d.y})`);
            
            resetVisuals();
        }

        // --- Algorithm Logic (Generators) ---
        function* runBFS(startId) {
            let queue = [startId];
            let inStructure = new Set([startId]);
            let visited = [];

            yield { current: null, structure: [...queue], visited: [...visited], traceEdge: null, inStructure };

            while (queue.length > 0) {
                let current = queue.shift();
                inStructure.delete(current);
                visited.push(current);

                // State: Node processing
                yield { current, structure: [...queue], visited: [...visited], traceEdge: null, inStructure };

                for (let neighbor of State.adjacencyList[current]) {
                    if (!visited.includes(neighbor) && !inStructure.has(neighbor)) {
                        queue.push(neighbor);
                        inStructure.add(neighbor);
                        // State: Edge expanding
                        yield { current, structure: [...queue], visited: [...visited], traceEdge: [current, neighbor], inStructure };
                    }
                }
            }
            // State: Complete
            yield { current: null, structure: [], visited: [...visited], traceEdge: null, inStructure: new Set(), done: true };
        }

        function* runDFS(startId) {
            let stack = [startId];
            let inStructure = new Set([startId]);
            let visited = [];

            yield { current: null, structure: [...stack], visited: [...visited], traceEdge: null, inStructure };

            while (stack.length > 0) {
                let current = stack.pop();
                inStructure.delete(current);

                if (visited.includes(current)) continue;
                visited.push(current);

                // State: Node processing
                yield { current, structure: [...stack], visited: [...visited], traceEdge: null, inStructure };

                // Reverse for alphabetical processing in LIFO
                let neighbors = [...State.adjacencyList[current]].reverse(); 
                for (let neighbor of neighbors) {
                    if (!visited.includes(neighbor)) {
                        stack.push(neighbor);
                        inStructure.add(neighbor); // Note: DFS stack may hold duplicates in standard impl, but visual clarity dictates strict tracking
                        // State: Edge expanding
                        yield { current, structure: [...stack], visited: [...visited], traceEdge: [current, neighbor], inStructure };
                    }
                }
            }
            // State: Complete
            yield { current: null, structure: [], visited: [...visited], traceEdge: null, inStructure: new Set(), done: true };
        }

        // --- Controller Logic ---
        function handleNodeClick(nodeId) {
            if (State.isRunning) return; // Ignore if currently running

            State.startNode = nodeId;
            State.algorithm = UI.algoSelect.value;
            
            // Setup UI for Algorithm
            setupDataStructureUI();
            
            // Initialize Generator
            State.generator = State.algorithm === 'BFS' ? runBFS(nodeId) : runDFS(nodeId);
            
            // Execute first yield to setup initial state
            const initialState = State.generator.next().value;
            updateVisualization(initialState);

            State.isRunning = true;
            UI.btnStep.disabled = false;
            UI.btnPlay.disabled = false;
            UI.btnReset.disabled = false;
            UI.algoSelect.disabled = true;
            UI.btnRegenerate.disabled = true;
            UI.statusText.innerText = `${State.algorithm} initialized at ${nodeId}. Press Play or Step.`;
        }

        function executeStep() {
            if (!State.generator) return;
            const result = State.generator.next();
            
            if (result.value) {
                updateVisualization(result.value);
            }

            if (result.done || (result.value && result.value.done)) {
                finishExecution();
            }
        }

        function togglePlay() {
            if (State.isPaused) {
                // Play
                State.isPaused = false;
                UI.btnPlay.innerText = "Pause";
                UI.btnStep.disabled = true;
                State.playInterval = setInterval(executeStep, parseInt(UI.speed.value));
                UI.statusText.innerText = `Running ${State.algorithm}...`;
            } else {
                // Pause
                State.isPaused = true;
                UI.btnPlay.innerText = "Play";
                UI.btnStep.disabled = false;
                clearInterval(State.playInterval);
                UI.statusText.innerText = `Paused.`;
            }
        }

        function finishExecution() {
            State.isPaused = true;
            clearInterval(State.playInterval);
            UI.btnPlay.innerText = "Play";
            UI.btnPlay.disabled = true;
            UI.btnStep.disabled = true;
            UI.statusText.innerText = `Traversal Complete!`;
            resetTrace();
        }

        function resetSimulationState() {
            State.isRunning = false;
            State.isPaused = true;
            State.startNode = null;
            clearInterval(State.playInterval);
            State.generator = null;
            
            UI.btnStep.disabled = true;
            UI.btnPlay.disabled = true;
            UI.btnReset.disabled = true;
            UI.btnPlay.innerText = "Play";
            UI.algoSelect.disabled = false;
            UI.btnRegenerate.disabled = false;
            
            UI.outputVisited.innerText = "None";
            UI.dsContainer.innerHTML = "";
            UI.statusText.innerText = "Select a start node.";
            resetVisuals();
        }

        // --- Visual Update Logic ---
        function updateVisualization(state) {
            // 1. Update Graph Nodes
            gNodes.selectAll("circle")
                .attr("fill", d => {
                    if (state.visited.includes(d.id)) return "var(--node-visited)";
                    if (d.id === state.current) return "var(--node-current)";
                    if (state.inStructure.has(d.id)) return "var(--node-structure)";
                    return "var(--node-default)";
                });

            // 2. Update Trace Mode Edges
            resetTrace();
            if (State.traceMode && state.traceEdge) {
                const [u, v] = state.traceEdge;
                // Edges might be registered as u-v or v-u
                let link = d3.select(`#link-${u}-${v}`).node() ? d3.select(`#link-${u}-${v}`) : d3.select(`#link-${v}-${u}`);
                link.attr("stroke", "var(--edge-trace)").attr("stroke-width", "4px");
            }

            // 3. Update Data Structure View
            UI.dsContainer.innerHTML = "";
            state.structure.forEach(nodeId => {
                const div = document.createElement('div');
                div.className = 'ds-item';
                div.innerText = nodeId;
                UI.dsContainer.appendChild(div);
            });

            // 4. Update Output
            UI.outputVisited.innerText = state.visited.length > 0 ? state.visited.join(" → ") : "None";
        }

        function resetVisuals() {
            gNodes.selectAll("circle").attr("fill", "var(--node-default)");
            resetTrace();
        }

        function resetTrace() {
            gLinks.selectAll(".link")
                .attr("stroke", "var(--edge-default)")
                .attr("stroke-width", "2px");
        }

        function setupDataStructureUI() {
            if (State.algorithm === 'BFS') {
                UI.dsTitle.innerText = "Queue (FIFO)";
                UI.dsIndicators.innerHTML = "Front &rarr; ... &larr; Back";
                UI.dsContainer.className = "ds-queue";
            } else {
                UI.dsTitle.innerText = "Stack (LIFO)";
                UI.dsIndicators.innerHTML = "Top<br>&darr;<br>Bottom";
                UI.dsContainer.className = "ds-stack";
            }
        }

        // --- Event Listeners ---
        UI.nodeCount.addEventListener('input', e => UI.nodeCountVal.innerText = e.target.value);
        UI.density.addEventListener('input', e => {
            const labels = ["Low", "Medium", "High"];
            UI.densityVal.innerText = labels[e.target.value];
        });
        
        UI.btnRegenerate.addEventListener('click', generateGraph);
        UI.btnReset.addEventListener('click', resetSimulationState);
        UI.btnStep.addEventListener('click', executeStep);
        UI.btnPlay.addEventListener('click', togglePlay);
        
        UI.speed.addEventListener('input', e => {
            if (!State.isPaused) {
                clearInterval(State.playInterval);
                State.playInterval = setInterval(executeStep, parseInt(e.target.value));
            }
        });

        UI.traceToggle.addEventListener('change', e => {
            State.traceMode = e.target.checked;
            if (!State.traceMode) resetTrace();
        });

        UI.algoSelect.addEventListener('change', e => {
            State.algorithm = e.target.value;
            setupDataStructureUI();
        });

        // Initialize
        generateGraph();
        setupDataStructureUI();

    </script>
</body>
</html>
